---
function:
  description: Lambda that backs onto the NewsAPI, as it does not allow browser requests
  events:
    - http:
        cors: true
        method: get
        path: /news
  handler: dist/src/lambdas/news/handler.handler
  logRetentionInDays: 7
  name: home-dashboard-news
  role:
    Fn::GetAtt:
      - NewsLambdaRole
      - Arn
role:
  Properties:
    AssumeRolePolicyDocument:
      Statement:
        - Action: sts:AssumeRole
          Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
      Version: '2012-10-17'
    Policies:
      - PolicyDocument:
          Statement:
            - Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Effect: Allow
              Resource: '*'
          Version: '2012-10-17'
        PolicyName: NewsLambdaPolicy
    RoleName: home-dashboard-news-lambda-role
  Type: AWS::IAM::Role