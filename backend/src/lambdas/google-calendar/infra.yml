---
function:
  description: Retrieves events from Google calendar
  events:
    - http:
        cors: true
        method: get
        path: /calendar
  handler: dist/src/lambdas/google-calendar/handler.handler
  logRetentionInDays: 7
  name: home-dashboard-calendar
  role:
    Fn::GetAtt:
      - CalendarLambdaRole
      - Arn
role:
  Properties:
    AssumeRolePolicyDocument:
      Statement:
        - Action: sts:AssumeRole
          Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
      Version: '2012-10-17'
    Policies:
      - PolicyDocument:
          Statement:
            - Action:
                - ssm:GetParameter
              Effect: Allow
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/home-dashboard-calendar*
            - Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Effect: Allow
              Resource: '*'
          Version: '2012-10-17'
        PolicyName: CalendarSsmAccess
    RoleName: home-dashboard-calendar-lambda-role
  Type: AWS::IAM::Role