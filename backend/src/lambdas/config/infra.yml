---
function:
  description: CRUD operations for config for Home Dashboard
  events:
    - http:
        cors: true
        method: get
        path: /config
    - http:
        cors: true
        method: put
        path: /config
    - http:
        cors: true
        method: delete
        path: /config
  handler: dist/src/lambdas/config/handler.handler
  logRetentionInDays: 7
  name: home-dashboard-config
  role:
    Fn::GetAtt:
      - ConfigLambdaRole
      - Arn
role:
  Properties:
    AssumeRolePolicyDocument:
      Statement:
        - Action: sts:AssumeRole
          Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
      Version: '2012-10-17'
    Policies:
      - PolicyDocument:
          Statement:
            - Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
              Effect: Allow
              Resource:
                - arn:aws:s3:::home-dashboard-config/*
            - Action:
                - s3:ListBucket
              Effect: Allow
              Resource:
                - arn:aws:s3:::home-dashboard-config
            - Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Effect: Allow
              Resource: '*'
          Version: '2012-10-17'
        PolicyName: ConfigBucketAccess
    RoleName: home-dashboard-config-lambda-role
  Type: AWS::IAM::Role