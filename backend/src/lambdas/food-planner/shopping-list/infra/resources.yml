---
Resources:
  ShoppingListLambdaRole:
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
        Version: '2012-10-17'
      Policies:
        - PolicyDocument:
            Statement:
              - Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Effect: Allow
                Resource:
                  - arn:aws:s3:::home-dashboard-food-planner/*
              - Action:
                  - s3:ListBucket
                Effect: Allow
                Resource:
                  - arn:aws:s3:::home-dashboard-food-planner
              - Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Effect: Allow
                Resource: '*'
            Version: '2012-10-17'
          PolicyName: ShoppingListLambdaPolicy
      RoleName: home-dashboard-shopping-list-lambda-role
    Type: AWS::IAM::Role