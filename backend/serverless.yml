service: home-dashboard-backend
frameworkVersion: '3'
useDotenv: true

provider:
  lambdaHashingVersion: 20201221
  name: aws
  region: eu-west-1
  runtime: nodejs24.x
  stage: api
  timeout: 30

package:
  patterns:
    - '!**'
    - dist/**
    - node_modules/**

functions:
  - ${file(./src/lambdas/config/function.yml)}
  - ${file(./src/lambdas/google-calendar/function.yml)}
  - ${file(./src/lambdas/news/function.yml)}

resources:
  - ${file(./src/lambdas/config/resources.yml)}
  - ${file(./src/lambdas/google-calendar/resources.yml)}
  - ${file(./src/lambdas/news/resources.yml)}
  - ${file(./infra/s3.yml)}